apiVersion: apps/v1
kind: Deployment
metadata:
  name: okd-poc
  labels:
    app: okd-poc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: okd-poc
  template:
    metadata:
      labels:
        app: okd-poc
    spec:
      containers:
        - name: okd-poc
          image: your-registry/okd-poc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: okd-poc-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
